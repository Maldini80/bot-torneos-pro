<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BLITZ | Ranking ELO y Hall Of Fame</title>
    <meta name="description" content="Ranking ELO oficial y Hall of Fame de competiciones THE BLITZ.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f6ff;
            --primary-dark: #0066ff;
            --bg-dark: #050510;
            --text-light: #ffffff;
            --glow: rgba(0, 246, 255, 0.8);
            --card-bg: rgba(10, 10, 20, 0.8);
            --card-border: rgba(0, 246, 255, 0.3);
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            background-image: url('https://i.imgur.com/b6P7Ed3.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
        }

        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7) 0%, rgba(0, 26, 41, 0.7) 25%, rgba(26, 0, 26, 0.7) 50%, rgba(0, 10, 26, 0.7) 75%, rgba(10, 10, 10, 0.7) 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        h1 {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 3.5rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--glow), 0 0 20px var(--glow), 4px 4px 0px var(--primary-dark);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary-dark);
            color: var(--text-light);
            padding: 12px 30px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .tab-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--glow);
        }

        .tab-btn.active {
            background: var(--primary-dark);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--glow);
            text-shadow: 0 0 5px white;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ranking-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            overflow-x: auto;
            white-space: nowrap;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(0, 246, 255, 0.1);
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .rank-number {
            font-family: 'Bebas Neue', display;
            font-size: 1.5rem;
            color: var(--primary);
            text-align: center;
            width: 50px;
        }

        .rank-1 .rank-number { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .rank-2 .rank-number { color: var(--silver); text-shadow: 0 0 10px var(--silver); }
        .rank-3 .rank-number { color: var(--bronze); text-shadow: 0 0 10px var(--bronze); }

        .team-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
            background: #111;
        }

        .team-name {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .team-abbr {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .elo-score {
            font-family: 'Bebas Neue', display;
            font-size: 1.8rem;
            color: var(--primary);
            text-shadow: 0 0 5px var(--glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .edit-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 4px;
            padding: 5px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .stats-cell {
            font-size: 1rem;
            font-weight: 500;
        }

        .streak-fire { color: #ff4500; font-weight: bold; }
        .streak-ice { color: #87ceeb; }

        /* Secondary Leaderboards */
        .hof-lists {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .hof-list-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .hof-list-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 246, 255, 0.2);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .hof-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hof-item:last-child {
            border-bottom: none;
        }

        .hof-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hof-item-rank {
            font-family: 'Bebas Neue', display;
            font-size: 1.3rem;
            color: var(--primary);
            width: 25px;
            text-align: center;
        }
        
        .hof-item-rank.rank-1 { color: var(--gold); text-shadow: 0 0 5px var(--gold); }
        .hof-item-rank.rank-2 { color: var(--silver); text-shadow: 0 0 5px var(--silver); }
        .hof-item-rank.rank-3 { color: var(--bronze); text-shadow: 0 0 5px var(--bronze); }

        .hof-item-logo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hof-item-name {
            font-weight: 600;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .hof-item-value {
            font-family: 'Bebas Neue', display;
            font-size: 1.3rem;
            color: #fff;
        }

        .hof-team-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
            background: #111;
        }

        .hof-runnerup .hof-team-logo {
            border-color: var(--silver);
            width: 50px;
            height: 50px;
        }

        .hof-team-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .hof-result {
            font-family: 'Bebas Neue', display;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .badge-winner {
            background: var(--gold);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: var(--primary);
            font-family: 'Exo 2', sans-serif;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .tabs { flex-direction: column; width: 100%; }
            .hof-grid { grid-template-columns: 1fr; }
            .stats-hide-mobile { display: none; }
        }
    </style>
</head>

<body>
    <div class="animated-background"></div>
    <div class="container">
        <header>
            <a href="/home.html">
                <img src="logo-the-blitz.png" alt="THE BLITZ" class="logo">
            </a>
            <h1>THE BLITZ ELO</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ranking')">🏆 Ranking Global</button>
            <button class="tab-btn" onclick="switchTab('hof')">⭐ Hall Of Fame</button>
            <button class="tab-btn" id="adminBackfillBtn" style="display: none; border-color: #ff0055;" onclick="triggerBackfill()">🛠️ Recalcular Stats (Admin)</button>
            <button class="tab-btn" id="adminRefreshLeaguesBtn" style="display: none; border-color: #00e5ff;" onclick="triggerLeagueRefresh()">🛡️ Recalcular Ligas (Admin)</button>
        </div>

        <div id="ranking" class="content-section active">
            <div class="ranking-container">
                <table id="rankingTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Equipo</th>
                            <th>ELO</th>
                            <th class="stats-hide-mobile">V-E-D</th>
                            <th class="stats-hide-mobile">Racha</th>
                            <th class="stats-hide-mobile">Títulos</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <tr><td colspan="6" class="loading">Cargando Ranking...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="hof" class="content-section">
            <div id="hofLists" class="hof-lists">
                <div class="loading">Cargando Récords Históricos...</div>
            </div>
        </div>
    </div>

    <script>
        let isAdminVisitor = false;

        async function checkSession() {
            try {
                const response = await fetch('/api/user');
                const user = await response.json();
                if (user && user.isAdmin) {
                    isAdminVisitor = true;
                    document.getElementById('adminBackfillBtn').style.display = 'inline-block';
                    document.getElementById('adminRefreshLeaguesBtn').style.display = 'inline-block';
                }
            } catch (e) { console.error(e); }
        }

        async function triggerBackfill() {
            if (!confirm("⚠️ ¿Estás seguro de recalcular todas las estadísticas en base a los torneos finalizados (Backfill)? Esto procesará todos los partidos y podría tardar un momento.")) return;
            const btn = document.getElementById('adminBackfillBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Procesando...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/run-backfill', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert('✅ Éxito: ' + data.message);
                    loadRanking();
                    loadHallOfFame();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (e) {
                alert('❌ Error de red al intentar ejecutar.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function triggerLeagueRefresh() {
            if (!confirm("⚠️ ¿Estás seguro de recalcular de forma masiva las ligas de TODOS los equipos en base a su ELO actual?")) return;
            const btn = document.getElementById('adminRefreshLeaguesBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Recalculando...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/recalculate-leagues', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert('✅ Éxito: ' + data.message);
                    loadRanking();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (e) {
                alert('❌ Error de red al intentar ejecutar.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function openEditElo(teamId, currentElo, teamName) {
            const newEloStr = prompt(`Nuevo ELO para ${teamName}:`, currentElo);
            if (newEloStr === null) return;
            const newElo = parseInt(newEloStr, 10);
            if (isNaN(newElo) || newElo < 0) {
                alert("❌ El ELO debe ser un número entero mayor o igual a 0.");
                return;
            }
            try {
                const res = await fetch('/api/elo/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teamId, newElo })
                });
                const data = await res.json();
                if (data.success) {
                    loadRanking(); // Recargar la tabla
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (e) {
                alert("❌ Error de red.");
            }
        }

        async function loadRanking() {
            try {
                const response = await fetch('/api/elo/ranking');
                const teams = await response.json();
                const tbody = document.getElementById('rankingBody');
                tbody.innerHTML = '';

                if (teams.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay equipos registrados</td></tr>';
                    return;
                }

                teams.forEach((team, index) => {
                    const rank = index + 1;
                    const stats = team.historicalStats || {};
                    const wins = stats.totalWins || 0;
                    const draws = stats.totalDraws || 0;
                    const losses = stats.totalLosses || 0;
                    const titles = stats.tournamentsWon || 0;
                    
                    let streakHtml = '-';
                    if (stats.currentWinStreak > 0) {
                        streakHtml = `<span class="streak-fire"><i class="fas fa-fire"></i> W${stats.currentWinStreak}</span>`;
                    } else if (stats.currentLossStreak > 0) {
                        streakHtml = `<span class="streak-ice"><i class="fas fa-snowflake"></i> L${stats.currentLossStreak}</span>`;
                    }

                    const currentElo = team.elo || 1000;
                    let leagueBadge = '';
                    if (currentElo >= 1550) {
                        leagueBadge = '<span style="background:linear-gradient(45deg, #00d2ff, #3a7bd5); color:#fff; padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:bold; margin-left:8px; vertical-align:middle; text-shadow: 0 1px 2px rgba(0,0,0,0.4);">DIAMOND</span>';
                    } else if (currentElo >= 1300) {
                        leagueBadge = '<span style="background:var(--gold); color:#000; padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:bold; margin-left:8px; vertical-align:middle;">GOLD</span>';
                    } else if (currentElo >= 1000) {
                        leagueBadge = '<span style="background:var(--silver); color:#000; padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:bold; margin-left:8px; vertical-align:middle;">SILVER</span>';
                    } else {
                        leagueBadge = '<span style="background:var(--bronze); color:#fff; padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:bold; margin-left:8px; vertical-align:middle;">BRONZE</span>';
                    }

                    const row = document.createElement('tr');
                    if (rank <= 3) row.classList.add(`rank-${rank}`);

                    row.innerHTML = `
                        <td class="rank-number">${rank}</td>
                        <td>
                            <div class="team-info">
                                <img src="${team.logoUrl || 'https://i.imgur.com/X2YIZh4.png'}" class="team-logo" alt="logo" onerror="this.src='https://i.imgur.com/X2YIZh4.png'">
                                <div>
                                    <div class="team-name">${team.name}</div>
                                    <div class="team-abbr">${team.abbreviation} ${leagueBadge}</div>
                                </div>
                            </div>
                        </td>
                        <td class="elo-score">
                            ${currentElo}
                            ${isAdminVisitor ? `<button class="edit-btn" onclick="openEditElo('${team._id}', ${currentElo}, '${team.name}')" title="Editar ELO"><i class="fas fa-pencil-alt"></i></button>` : ''}
                        </td>
                        <td class="stats-cell stats-hide-mobile">${wins} - ${draws} - ${losses}</td>
                        <td class="stats-cell stats-hide-mobile">${streakHtml}</td>
                        <td class="stats-cell stats-hide-mobile"><i class="fas fa-trophy" style="color:var(--gold)"></i> ${titles}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error("Error loading ranking:", error);
                document.getElementById('rankingBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">Error cargando datos</td></tr>';
            }
        }

        async function loadHallOfFame() {
            try {
                const response = await fetch('/api/elo/hall-of-fame');
                const statsMap = await response.json();
                
                const renderList = (title, items, valueFunc, icon) => {
                    if (!items || items.length === 0) return '';
                    let html = `<div class="hof-list-card">
                                  <div class="hof-list-title"><i class="fas ${icon}"></i> ${title}</div>`;
                    items.forEach((team, idx) => {
                        const rankClass = idx < 3 ? `rank-${idx + 1}` : '';
                        html += `
                            <div class="hof-item">
                                <div class="hof-item-left">
                                    <div class="hof-item-rank ${rankClass}">#${idx + 1}</div>
                                    <img src="${team.logoUrl || team.logo || 'https://i.imgur.com/X2YIZh4.png'}" class="hof-item-logo" onerror="this.src='https://i.imgur.com/X2YIZh4.png'">
                                    <div class="hof-item-name">${team.name || team.nombre}</div>
                                </div>
                                <div class="hof-item-value">${valueFunc(team)}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    return html;
                };

                const container = document.getElementById('hofLists');
                container.innerHTML = 
                    renderList('Top Campeones', statsMap.topCampeones, t => t.historicalStats.tournamentsWon + ' 🏆', 'fa-crown') +
                    renderList('Máximos Goleadores', statsMap.topGoleadores, t => t.historicalStats.totalGoalsScored + ' ⚽', 'fa-futbol') +
                    renderList('Top Victorias', statsMap.topVictorias, t => t.historicalStats.totalWins + ' 🟢', 'fa-check-circle') +
                    renderList('Muro Defensivo', statsMap.topDefensas, t => t.historicalStats.totalGoalsConceded + ' 🛡️', 'fa-shield-alt') +
                    renderList('Más Veteranos', statsMap.topVeteranos, t => t.historicalStats.tournamentsPlayed + ' 🏟️', 'fa-history');

            } catch (error) {
                console.error("Error loading HOF:", error);
                document.getElementById('hofLists').innerHTML = '<div style="color:red; text-align:center;">Error cargando estadísticas.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
            loadRanking();
            loadHallOfFame();
        });
    </script>
</body>
</html>
